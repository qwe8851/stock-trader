version: "3.9"

# =============================================================================
# Stock Trader - Docker Compose
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL with TimescaleDB extension
  # ---------------------------------------------------------------------------
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: stock-trader-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-traderpassword}
      POSTGRES_DB: ${POSTGRES_DB:-stocktrader}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trader} -d ${POSTGRES_DB:-stocktrader}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis - Cache and Pub/Sub for real-time price streaming
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: stock-trader-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Backend - FastAPI
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: stock-trader-backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-trader}:${POSTGRES_PASSWORD:-traderpassword}@postgres:5432/${POSTGRES_DB:-stocktrader}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # ---------------------------------------------------------------------------
  # Frontend - React + Vite
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: stock-trader-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_WS_BASE_URL: ws://localhost:8000

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: stock-trader-network
